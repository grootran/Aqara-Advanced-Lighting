    loop_mode:
      name: Loop mode
      description: How the sequence should loop.
      required: false
      default: "once"
      selector:
        select:
          options:
            - label: "Run once"
              value: "once"
            - label: "Loop X times"
              value: "count"
            - label: "Continuous loop"
              value: "continuous"
    loop_count:
      name: Loop count
      description: Number of times to loop the sequence (required when loop mode is 'Loop X times').
      required: false
      example: 5
      selector:
        number:
          min: 1
          max: 1000
          mode: box
    end_behavior:
      name: End behavior
      description: What to do when the sequence completes.
      required: false
      default: "maintain"
      selector:
        select:
          options:
            - label: "Maintain last state"
              value: "maintain"
            - label: "Turn off light"
              value: "turn_off"

stop_cct_sequence:
  name: Stop CCT sequence
  description: Stop a running CCT sequence on Aqara lights.
  target:
    entity:
      domain: light
      integration: mqtt

pause_cct_sequence:
  name: Pause CCT sequence
  description: Pause a running CCT sequence on Aqara lights. The sequence will stop at its current state until resumed.
  target:
    entity:
      domain: light
      integration: mqtt

resume_cct_sequence:
  name: Resume CCT sequence
  description: Resume a paused CCT sequence on Aqara lights. The sequence will continue from where it was paused.
  target:
    entity:
      domain: light
      integration: mqtt
