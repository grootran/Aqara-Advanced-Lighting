start_cct_sequence:
  name: Start CCT sequence
  description: Start a dynamic CCT (color temperature) sequence on Aqara lights. Use a preset sequence or define up to 10 custom steps with color temperature, brightness, transition, and hold time. For 11-20 steps, use YAML mode.
  target:
    entity:
      domain: light
  fields:
    preset:
      name: Preset sequence
      description: Choose a preset CCT sequence or type your custom preset name. When selected, manual step parameters are ignored.
      required: false
      selector:
        select:
          options: []
          mode: dropdown
          custom_value: true
    turn_on:
      name: Turn on light
      description: Automatically turn on the light before starting the sequence if it is off.
      required: false
      default: false
      selector:
        boolean:
    sync:
      name: Synchronized
      description: When targeting multiple lights, start the sequence on all lights simultaneously for synchronized group effects.
      required: false
      default: true
      selector:
        boolean:
    step_1:
      name: "Step 1 (Required)"
      collapsed: false
      fields:
        step_1_color_temp:
          name: "Color temperature"
          description: Color temperature in kelvin (2700-6500K).
          required: true
          default: 2700
          selector:
            number:
              min: 2700
              max: 6500
              step: 100
              unit_of_measurement: "K"
              mode: slider
        step_1_brightness:
          name: "Brightness"
          description: Brightness level (1-100%).
          required: true
          default: 50
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        step_1_transition:
          name: "Transition time"
          description: Time in seconds to transition to this step's settings (0-3600).
          required: true
          default: 2.0
          selector:
            number:
              min: 0
              max: 3600
              step: 0.1
              unit_of_measurement: "s"
              mode: box
        step_1_hold:
          name: "Hold time"
          description: Time to hold at this step after transition completes, before next step starts (0-43200).
          required: true
          default: 10.0
          selector:
            number:
              min: 0
              max: 43200
              step: 0.1
              unit_of_measurement: "s"
