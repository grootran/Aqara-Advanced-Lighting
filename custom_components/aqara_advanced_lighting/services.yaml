start_dynamic_scene:
  name: Start dynamic scene
  description: Start a dynamic scene on target lights with slow color transitions. Creates ambient lighting by cycling through colors with configurable timing and distribution across multiple lights.
  target:
    entity:
      domain: light
  fields:
    preset:
      name: Preset scene
      description: Choose a preset dynamic scene or type your custom preset name. When selected, manual color parameters are ignored.
      required: false
      selector:
        select:
          options: []
          mode: dropdown
          custom_value: true
    color_1:
      name: Color 1
      description: "First scene color (required if not using a preset). Set x, y (CIE coordinates) and brightness_pct (1-100%)."
      required: false
      example:
        x: 0.68
        y: 0.32
        brightness_pct: 80
      selector:
        object:
    color_2:
      name: Color 2
      description: "Second scene color. Set x, y (CIE coordinates) and brightness_pct (1-100%)."
      required: false
      example:
        x: 0.15
        y: 0.06
        brightness_pct: 60
      selector:
        object:
    color_3:
      name: Color 3
      description: "Third scene color. Set x, y (CIE coordinates) and brightness_pct (1-100%)."
      required: false
      selector:
        object:
    color_4:
      name: Color 4
      description: "Fourth scene color. Set x, y (CIE coordinates) and brightness_pct (1-100%)."
      required: false
      selector:
        object:
    color_5:
      name: Color 5
      description: "Fifth scene color. Set x, y (CIE coordinates) and brightness_pct (1-100%)."
      required: false
      selector:
        object:
    color_6:
      name: Color 6
      description: "Sixth scene color. Set x, y (CIE coordinates) and brightness_pct (1-100%)."
      required: false
      selector:
        object:
    color_7:
      name: Color 7
      description: "Seventh scene color. Set x, y (CIE coordinates) and brightness_pct (1-100%)."
      required: false
      selector:
        object:
    color_8:
      name: Color 8
      description: "Eighth scene color. Set x, y (CIE coordinates) and brightness_pct (1-100%)."
      required: false
      selector:
        object:
    transition_time:
      name: Transition time
      description: Time in seconds for color transitions (30-3600 seconds).
      required: false
      default: 30.0
      selector:
        number:
          min: 30
          max: 3600
          step: 1
          unit_of_measurement: "s"
          mode: slider
    hold_time:
      name: Hold time
      description: Time in seconds to hold each color before transitioning (0-3600 seconds).
      required: false
      default: 10.0
      selector:
        number:
          min: 0
          max: 3600
          step: 1
          unit_of_measurement: "s"
          mode: slider
    distribution_mode:
      name: Color assignment
      description: How colors are assigned and cycled across lights.
      required: false
      default: "shuffle_rotate"
      selector:
        select:
          options:
            - label: "Shuffle and rotate"
              value: "shuffle_rotate"
            - label: "Synchronized"
              value: "synchronized"
            - label: "Random"
              value: "random"
    offset_delay:
      name: Transition stagger
      description: Delay in seconds between each light's color transition (0-10 seconds). Creates a staggered wave effect.
      required: false
      default: 0.0
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
          unit_of_measurement: "s"
          mode: slider
    random_order:
      name: Randomize light order
      description: Randomize the order in which lights transition.
      required: false
      default: false
      selector:
        boolean:
    loop_mode:
      name: Loop mode
      description: How the scene should loop.
      required: false
      default: "continuous"
      selector:
        select:
          options:
            - label: "Run once"
              value: "once"
            - label: "Loop X times"
              value: "count"
            - label: "Continuous loop"
              value: "continuous"
    loop_count:
      name: Loop count
      description: Number of times to loop the scene (required when loop mode is 'Loop X times').
      required: false
      selector:
        number:
          min: 1
          max: 1000
          mode: box
    end_behavior:
      name: End behavior
      description: What to do when the scene completes.
      required: false
      default: "restore"
      selector:
        select:
          options:
            - label: "Restore previous state"
              value: "restore"
            - label: "Maintain last color"
              value: "maintain"
    scene_name:
      name: Scene name
      description: Display name for tracking the running scene. Used internally when activating scenes with manual color parameters instead of a preset.
      required: false
      advanced: true
      selector:
        text:
    static:
      name: Static mode
      description: Apply the scene colors once without starting a transition loop. Colors are distributed according to the distribution mode and applied instantly.
      required: false
      default: false
      selector:
        boolean:

stop_dynamic_scene:
  name: Stop dynamic scene
  description: Stop running dynamic scene(s) on the target lights.
  target:
    entity:
      domain: light
  fields:
    restore_state:
      name: Restore state
      description: Restore lights to their pre-scene state. If disabled, lights maintain their current color.
      required: false
      default: true
      selector:
        boolean:

pause_dynamic_scene:
  name: Pause dynamic scene
  description: Pause running dynamic scene(s) on the target lights. Lights hold their current color until resumed.
  target:
    entity:
      domain: light

resume_dynamic_scene:
  name: Resume dynamic scene
  description: Resume paused dynamic scene(s) on the target lights. The scene continues from where it was paused.
  target:
    entity:
      domain: light

set_music_sync:
  name: Set music sync
  description: Control audio-reactive lighting mode on T1 LED Strip. Enables the strip's built-in microphone to react to sound with visual effects.
  target:
    entity:
      domain: light
  fields:
    enabled:
      name: Enabled
      description: Enable or disable music sync mode.
      required: true
      selector:
        boolean:
    sensitivity:
      name: Sensitivity
      description: Audio sensitivity level.
      required: false
      default: "low"
      selector:
        select:
          options:
            - label: "Low"
              value: "low"
            - label: "High"
              value: "high"
    audio_effect:
      name: Effect
      description: Audio-reactive effect type.
      required: false
      default: "random"
      selector:
        select:
          options:
            - label: "Random"
              value: "random"
            - label: "Blink"
              value: "blink"
            - label: "Rainbow"
              value: "rainbow"
            - label: "Wave"
              value: "wave"

resume_entity_control:
  name: Resume entity control
  description: >-
    Resume control of light entities that were paused due to external changes.
    When you manually change a light that is part of a running dynamic scene,
    CCT sequence, or segment sequence, the integration pauses control of that
    individual light. This service resumes control so the light rejoins the
    running action.
  fields:
    entity_id:
      name: Entity
      description: The light entity or entities to resume control for
      required: true
      selector:
        entity:
          multiple: true
          filter:
            domain: light
