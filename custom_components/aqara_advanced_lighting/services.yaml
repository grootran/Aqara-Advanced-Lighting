# Service definitions for Aqara Advanced Lighting

set_dynamic_effect:
  name: Set dynamic effect
  description: Activate a dynamic RGB effect on Aqara lights. Use presets from the Aqara app or create custom effects with up to 8 colors.
  target:
    entity:
      domain: light
      integration: mqtt
  fields:
    preset:
      name: Preset effect
      description: Choose a preset effect from the Aqara mobile app. When selected, manual effect/speed/color parameters are ignored.
      required: false
      selector:
        select:
          options:
            # T2 Bulb presets
            - label: "T2: Candlelight"
              value: "t2_candlelight"
            - label: "T2: Breath"
              value: "t2_breath"
            - label: "T2: Colorful"
              value: "t2_colorful"
            - label: "T2: Security"
              value: "t2_security"
            # T1M presets
            - label: "T1M: Dinner"
              value: "t1m_dinner"
            - label: "T1M: Sunset"
              value: "t1m_sunset"
            - label: "T1M: Autumn"
              value: "t1m_autumn"
            - label: "T1M: Galaxy"
              value: "t1m_galaxy"
            - label: "T1M: Daydream"
              value: "t1m_daydream"
            - label: "T1M: Holiday"
              value: "t1m_holiday"
            - label: "T1M: Party"
              value: "t1m_party"
            - label: "T1M: Meteor"
              value: "t1m_meteor"
            - label: "T1M: Alert"
              value: "t1m_alert"
            # T1 Strip presets
            - label: "T1 Strip: Rainbow"
              value: "t1_strip_rainbow"
            - label: "T1 Strip: Heartbeat"
              value: "t1_strip_heartbeat"
            - label: "T1 Strip: Gala"
              value: "t1_strip_gala"
            - label: "T1 Strip: Sea of Flowers"
              value: "t1_strip_sea_of_flowers"
            - label: "T1 Strip: Rhythmic"
              value: "t1_strip_rhythmic"
            - label: "T1 Strip: Exciting"
              value: "t1_strip_exciting"
            - label: "T1 Strip: Colorful"
              value: "t1_strip_colorful"
          mode: dropdown
    effect:
      name: Effect type
      description: Choose effect type manually (required if not using a preset). Available effects vary by light model.
      required: false
      selector:
        select:
          options:
            # T1M effects
            - label: "Flow 1"
              value: "flow1"
            - label: "Flow 2"
              value: "flow2"
            - label: "Fading"
              value: "fading"
            - label: "Hopping"
              value: "hopping"
            - label: "Breathing"
              value: "breathing"
            - label: "Rolling"
              value: "rolling"
            # T1 Strip effects (includes all T1M effects plus these)
            - label: "Rainbow 1"
              value: "rainbow1"
            - label: "Chasing"
              value: "chasing"
            - label: "Flash"
              value: "flash"
            - label: "Rainbow 2"
              value: "rainbow2"
            - label: "Flicker"
              value: "flicker"
            - label: "Dash"
              value: "dash"
            # T2 Bulb effects
            - label: "Candlelight"
              value: "candlelight"
          mode: dropdown
    speed:
      name: Speed
      description: Animation speed (1-100%). Required if not using a preset.
      required: false
      example: 75
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider
    color_1:
      name: Color 1
      description: First effect color (required if not using a preset).
      required: false
      default: [255, 0, 0]
      selector:
        color_rgb:
    color_2:
      name: Color 2
      description: Second effect color (optional).
      required: false
      default: [255, 127, 0]
      selector:
        color_rgb:
    color_3:
      name: Color 3
      description: Third effect color (optional).
      required: false
      default: [255, 255, 0]
      selector:
        color_rgb:
    color_4:
      name: Color 4
      description: Fourth effect color (optional).
      required: false
      default: [0, 255, 0]
      selector:
        color_rgb:
    color_5:
      name: Color 5
      description: Fifth effect color (optional).
      required: false
      default: [0, 0, 255]
      selector:
        color_rgb:
    color_6:
      name: Color 6
      description: Sixth effect color (optional).
      required: false
      default: [75, 0, 130]
      selector:
        color_rgb:
    color_7:
      name: Color 7
      description: Seventh effect color (optional).
      required: false
      default: [148, 0, 211]
      selector:
        color_rgb:
    color_8:
      name: Color 8
      description: Eighth effect color (optional).
      required: false
      default: [255, 255, 255]
      selector:
        color_rgb:
    segments:
      name: Segments
      description: For T1 Strip only - segments to apply effect to (e.g., "1-20", "odd", "even").
      required: false
      example: "1-20"
      selector:
        text:
    brightness:
      name: Brightness
      description: Brightness level for the effect (1-100%).
      required: false
      example: 80
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider
    turn_on:
      name: Turn on light
      description: Automatically turn on the light before applying the effect.
      required: false
      default: false
      selector:
        boolean:
    sync:
      name: Synchronized
      description: When targeting multiple lights, apply the effect to all lights simultaneously for synchronized group effects.
      required: false
      default: true
      selector:
        boolean:

stop_effect:
  name: Stop effect
  description: Stop the current RGB dynamic effect or segment pattern and restore the light to its previous state. If no previous state is saved, the effect is stopped without changing the light state.
  target:
    entity:
      domain: light
      integration: mqtt
  fields:
    restore_state:
      name: Restore state
      description: Restore the light to its pre-effect state (brightness, color, temperature). If disabled, only stops the effect without changing light settings.
      required: false
      default: true
      selector:
        boolean:

set_segment_pattern:
  name: Set segment pattern
  description: Set individual segment colors on T1M and T1 Strip lights. Use presets from the Aqara app or create custom patterns.
  target:
    entity:
      domain: light
      integration: mqtt
  fields:
    preset:
      name: Preset pattern
      description: Choose a preset segment pattern from the Aqara mobile app (Preset 1 through Preset 12). When selected, manual segment_colors parameter is ignored.
      required: false
      selector:
        select:
          options:
            - label: "Preset 1"
              value: "segment_1"
            - label: "Preset 2"
              value: "segment_2"
            - label: "Preset 3"
              value: "segment_3"
            - label: "Preset 4"
              value: "segment_4"
            - label: "Preset 5"
              value: "segment_5"
            - label: "Preset 6"
              value: "segment_6"
            - label: "Preset 7"
              value: "segment_7"
            - label: "Preset 8"
              value: "segment_8"
            - label: "Preset 9"
              value: "segment_9"
            - label: "Preset 10"
              value: "segment_10"
            - label: "Preset 11"
              value: "segment_11"
            - label: "Preset 12"
              value: "segment_12"
          mode: dropdown
    segment_colors:
      name: Segment colors
      description: List of segment/color pairs. Each entry specifies a segment (number or range like "1-5", "odd", "even") and its RGB color. Required if not using a preset.
      required: false
      example:
        - segment: 1
          color:
            r: 255
            g: 0
            b: 0
        - segment: "5-10"
          color:
            r: 0
            g: 255
            b: 0
      selector:
        object:
    brightness:
      name: Brightness
      description: Brightness level for the pattern (1-100%).
      required: false
      example: 80
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider
    turn_on:
      name: Turn on light
      description: Automatically turn on the light before applying the pattern.
      required: false
      default: false
      selector:
        boolean:
    turn_off_unspecified:
      name: Turn off unspecified segments
      description: Turn off segments not specified in the pattern.
      required: false
      default: false
      selector:
        boolean:
    sync:
      name: Synchronized
      description: When targeting multiple lights, apply the pattern to all lights simultaneously for synchronized group effects.
      required: false
      default: true
      selector:
        boolean:

create_gradient:
  name: Create gradient
  description: Create a smooth color gradient across segments on T1M and T1 Strip lights. Use 2-6 colors for the gradient.
  target:
    entity:
      domain: light
      integration: mqtt
  fields:
    color_1:
      name: Color 1
      description: First gradient color (required).
      required: true
      default: [255, 0, 0]
      selector:
        color_rgb:
    color_2:
      name: Color 2
      description: Second gradient color (required).
      required: true
      default: [0, 0, 255]
      selector:
        color_rgb:
    color_3:
      name: Color 3
      description: Third gradient color (optional).
      required: false
      default: [255, 255, 0]
      selector:
        color_rgb:
    color_4:
      name: Color 4
      description: Fourth gradient color (optional).
      required: false
      default: [0, 255, 0]
      selector:
        color_rgb:
    color_5:
      name: Color 5
      description: Fifth gradient color (optional).
      required: false
      default: [255, 0, 255]
      selector:
        color_rgb:
    color_6:
      name: Color 6
      description: Sixth gradient color (optional).
      required: false
      default: [0, 255, 255]
      selector:
        color_rgb:
    segments:
      name: Segments
      description: Segments to apply gradient to (e.g., "1-20", "5-15"). If not specified, applies to all segments.
      required: false
      example: "1-20"
      selector:
        text:
    brightness:
      name: Brightness
      description: Brightness level for the gradient (1-100%).
      required: false
      example: 80
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider
    turn_on:
      name: Turn on light
      description: Automatically turn on the light before applying the gradient.
      required: false
      default: false
      selector:
        boolean:
    turn_off_unspecified:
      name: Turn off unspecified segments
      description: Turn off segments not specified. Only applies when segments parameter is provided.
      required: false
      default: false
      selector:
        boolean:
    sync:
      name: Synchronized
      description: When targeting multiple lights, apply the gradient to all lights simultaneously for synchronized group effects.
      required: false
      default: true
      selector:
        boolean:

