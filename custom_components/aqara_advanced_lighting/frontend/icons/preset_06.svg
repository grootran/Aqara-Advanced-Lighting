        d="
          M200,200
          L200,20
          A180,180 0 0,1 380,200
          Z" />

  <!-- Segment 2 -->
  <path id="seg2" fill="#ff5888"
        d="
          M200,200
          L380,200
          A180,180 0 0,1 200,380
          Z" />

  <!-- Segment 3 -->
  <path id="seg3" fill="#ffd21e"
        d="
          M200,200
          L200,380
          A180,180 0 0,1 20,200
          Z" />

  <!-- Segment 4 -->
  <path id="seg4" fill="#b472e8"
        d="
          M200,200
          L20,200
          A180,180 0 0,1 200,20
          Z" />

</svg>