name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release with Zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release zip
        run: |
          cd custom_components
          zip -r ../aqara_advanced_lighting.zip aqara_advanced_lighting/
          cd ..

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract release notes
        id: release_notes
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | sed '$d' > RELEASE_NOTES.md

          # If RELEASE_NOTES.md is empty, provide a default message
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $VERSION" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: aqara_advanced_lighting.zip
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
