name: "Release"

on:
  release:
    types:
      - "published"

permissions: {}

jobs:
  release:
    name: "Add release zip"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Create release zip"
        run: |
          # Use git archive to package only tracked files
          git archive --format=zip --prefix=aqara_advanced_lighting/ \
            HEAD:custom_components/aqara_advanced_lighting \
            -o aqara_advanced_lighting.zip

          # Verify zip was created
          echo "Zip file created:"
          ls -lh aqara_advanced_lighting.zip

      - name: "Upload zip to release"
        uses: softprops/action-gh-release@v2
        with:
          files: aqara_advanced_lighting.zip
