name: Preset Submission
description: Share a custom lighting preset with the community
title: "[Preset]: "
labels: ["preset", "community-contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your custom preset with the community! Please provide details below so others can recreate and enjoy your lighting effect.

        **Tip:** Use the selective preset export feature to get your preset data. Open the Aqara Lighting panel, go to My Presets, click Select, choose the preset(s) you want to share, and click Export Selected.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting a preset
      options:
        - label: I have tested this preset and it works as expected
          required: true
        - label: This preset is my own creation or I have permission to share it
          required: true
        - label: I have searched existing presets to ensure this is not a duplicate
          required: true

  - type: input
    id: preset_name
    attributes:
      label: Preset Name
      description: A descriptive name for your preset
      placeholder: "e.g., Ocean Waves, Sunset Fade, Daylight Tracking, Work Day Rhythm"
    validations:
      required: true

  - type: dropdown
    id: preset_type
    attributes:
      label: Preset Type
      description: What type of lighting preset is this?
      options:
        - RGB Dynamic Effect
        - Segment Pattern
        - Gradient
        - Color Blocks
        - CCT Sequence (Standard)
        - CCT Sequence (Solar)
        - CCT Sequence (Schedule)
        - RGB Segment Sequence
        - Dynamic Scene
        - Audio-Reactive
        - Mixed/Combination
    validations:
      required: true

  - type: dropdown
    id: device_compatibility
    attributes:
      label: Compatible Devices
      description: Which device models have you tested this preset on?
      multiple: true
      options:
        - T1M (20 segment ring light)
        - T1M (26 segment ring light)
        - T1 Strip (RGB LED strip)
        - T2 RGB/CCT bulb (E26)
        - T2 RGB/CCT bulb (E27)
        - T2 RGB/CCT bulb (GU10)
        - Any CCT-capable light (for solar/schedule presets)
        - Any RGB-capable light (for dynamic scene presets)
        - Any light with ESPHome audio sensor (for audio-reactive presets)
    validations:
      required: true

  - type: dropdown
    id: zigbee_backend
    attributes:
      label: Zigbee Backend Tested
      description: Which Zigbee backend did you test this preset with?
      multiple: true
      options:
        - Zigbee2MQTT
        - ZHA (Zigbee Home Automation)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the visual effect and what inspired you to create it
      placeholder: |
        Example:
        This preset creates a calming ocean wave effect with blues and teals slowly moving across the segments. It's perfect for relaxation or bedtime routines.

        For solar/schedule presets, describe the daily rhythm:
        This solar preset tracks the sun to provide warm dim light at dawn/dusk and bright cool daylight at midday. Great for home offices.
    validations:
      required: true

  - type: textarea
    id: preset_configuration
    attributes:
      label: Preset Configuration
      description: |
        Provide the preset data in JSON format. Use the selective preset export feature to get clean data:

        **How to export your preset:**
        1. Open the Aqara Lighting panel
        2. Go to My Presets tab
        3. Click Select to enter selection mode
        4. Select your preset using the checkbox
        5. Click Export Selected
        6. Open the downloaded file and copy the preset data
      placeholder: |
        {
          "name": "Ocean Waves",
          "icon": "mdi:waves",
          "device_type": "t1m",
          "effect": "flow1",
          "effect_speed": 25,
          "effect_brightness": 75,
          "effect_colors": [
            {"x": 0.1610, "y": 0.3549},
            {"x": 0.1566, "y": 0.2854}
          ]
        }
      render: json
    validations:
      required: true

  - type: textarea
    id: parameters_explained
    attributes:
      label: Parameter Details
      description: |
        Explain key parameters and why you chose specific values
      placeholder: |
        - **Effect Speed (50)**: Slow enough to be calming but not static
        - **Color Palette**: Three shades of blue/teal to mimic ocean depth

        For solar presets:
        - **Elevation -6 (civil twilight)**: Warm 2700K at 50 brightness for pre-dawn
        - **Elevation 45 (high sun)**: Cool 6500K at full brightness for productivity

        For schedule presets:
        - **sunset-30**: Begin winding down 30 minutes before sunset
        - **sunrise+60**: Reach full brightness one hour after sunrise

        For audio-reactive presets:
        - **Detection Mode (spectral_flux)**: Good for all genres
        - **Color Advance (beat_predictive)**: Learns tempo for tight sync
        - **Sensitivity (75)**: High enough for quiet sections
        - **Latency Compensation (80ms)**: Tuned for Zigbee round-trip
    validations:
      required: false

  - type: dropdown
    id: brightness_recommendation
    attributes:
      label: Recommended Brightness
      description: What brightness level works best for this preset?
      options:
        - Low (1-30%)
        - Medium (31-70%)
        - High (71-100%)
        - Any
        - Varies by time of day (solar/schedule presets)
    validations:
      required: true

  - type: textarea
    id: automation_example
    attributes:
      label: Automation Example
      description: |
        If you use this preset in automations, share an example YAML configuration
      placeholder: |
        ```yaml
        automation:
          - alias: "Evening Ocean Waves"
            trigger:
              - platform: sun
                event: sunset
            action:
              - service: aqara_advanced_lighting.restore_preset
                data:
                  entity_id: light.bedroom_ring_light
                  preset_name: "Ocean Waves"
        ```
      render: yaml
    validations:
      required: false

  - type: dropdown
    id: tested_version
    attributes:
      label: Integration Version
      description: What version of Aqara Advanced Lighting did you test with?
      options:
        - 1.2.x
        - 1.1.x
        - 1.0.x
        - Older version
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional Notes
      description: |
        Any other information that might be helpful:
        - Tips for best results
        - Known limitations
        - Compatibility notes
        - Credits/inspiration sources
        - For solar presets: your approximate latitude (affects sun angles)
      placeholder: Any additional context or tips
    validations:
      required: false

  - type: checkboxes
    id: community_sharing
    attributes:
      label: Community Sharing
      description: How would you like this preset to be shared?
      options:
        - label: Add to official preset library (if accepted)
        - label: Include in documentation examples
        - label: Share in community preset collection
        - label: Credit me by username in preset metadata

  - type: markdown
    attributes:
      value: |
        ---

        **Thank you for contributing to the community!**

        After submission:
        - Maintainers will review and test your preset
        - Community members may provide feedback or suggestions
        - Popular presets may be featured in official documentation
        - You will be credited for your contribution

        **License:** By submitting this preset, you agree to share it under the MIT License, allowing others to use and modify it freely.
