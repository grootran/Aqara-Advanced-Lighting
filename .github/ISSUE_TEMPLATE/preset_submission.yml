name: Preset Submission
description: Share a custom lighting preset with the community
title: "[Preset]: "
labels: ["preset", "community-contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your custom preset with the community! Please provide details below so others can recreate and enjoy your lighting effect.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting a preset
      options:
        - label: I have tested this preset and it works as expected
          required: true
        - label: This preset is my own creation or I have permission to share it
          required: true
        - label: I have searched existing presets to ensure this is not a duplicate
          required: true

  - type: input
    id: preset_name
    attributes:
      label: Preset Name
      description: A descriptive name for your preset
      placeholder: "e.g., Ocean Waves, Sunset Fade, Police Lights"
    validations:
      required: true

  - type: dropdown
    id: preset_type
    attributes:
      label: Preset Type
      description: What type of lighting effect is this?
      options:
        - RGB Dynamic Effect
        - Segment Pattern
        - Gradient
        - Color Blocks
        - CCT Sequence
        - RGB Segment Sequence
        - Mixed/Combination
    validations:
      required: true

  - type: dropdown
    id: device_compatibility
    attributes:
      label: Compatible Devices
      description: Which device models have you tested this preset on?
      multiple: true
      options:
        - T1M (20 segment ring light)
        - T1M (26 segment ring light)
        - T1 Strip (RGB LED strip)
        - T2 RGB/CCT bulb (E26)
        - T2 RGB/CCT bulb (E27)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the visual effect and what inspired you to create it
      placeholder: |
        Example:
        This preset creates a calming ocean wave effect with blues and teals slowly moving across the segments. It's perfect for relaxation or bedtime routines.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Recommended Use Case
      description: When/where would this preset be most effective?
      placeholder: |
        Example:
        - Bedroom relaxation before sleep
        - Movie watching ambient lighting
        - Party/celebration atmosphere
        - Focus/concentration lighting
    validations:
      required: true

  - type: textarea
    id: preset_configuration
    attributes:
      label: Preset Configuration
      description: |
        Provide the preset data in JSON format. You can export this from the panel or copy from `.storage/aqara_advanced_lighting.presets`

        **How to export your preset:**
        1. Open the Aqara Advanced Lighting panel
        2. Go to Presets tab
        3. Click on your preset
        4. Copy the JSON data from the preset details
      placeholder: |
        {
          "name": "Ocean Waves",
          "type": "rgb_dynamic_effect",
          "config": {
            "effect_type": "breathing",
            "effect_speed": 50,
            "effect_colors": [
              {"r": 0, "g": 105, "b": 148},
              {"r": 0, "g": 150, "b": 199},
              {"r": 72, "g": 202, "b": 228}
            ]
          }
        }
      render: json
    validations:
      required: true

  - type: textarea
    id: setup_instructions
    attributes:
      label: Setup Instructions
      description: |
        Step-by-step instructions for recreating this preset manually (if not using JSON import)
      placeholder: |
        1. Open Aqara Advanced Lighting panel
        2. Select "Create Dynamic Effect"
        3. Choose effect type: Breathing
        4. Set speed to: 50
        5. Add colors:
           - Color 1: RGB(0, 105, 148) - Deep Ocean Blue
           - Color 2: RGB(0, 150, 199) - Ocean Blue
           - Color 3: RGB(72, 202, 228) - Sky Blue
        6. Save preset as "Ocean Waves"
    validations:
      required: false

  - type: textarea
    id: parameters_explained
    attributes:
      label: Parameter Details
      description: |
        Explain key parameters and why you chose specific values
      placeholder: |
        - **Effect Speed (50)**: Slow enough to be calming but not static
        - **Color Palette**: Three shades of blue/teal to mimic ocean depth
        - **Effect Type (Breathing)**: Gradual fade mimics wave motion
    validations:
      required: false

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity Level
      description: How complex is this preset to set up?
      options:
        - Simple (1-2 colors, basic effect)
        - Moderate (3-5 colors or segments)
        - Advanced (6+ colors, complex timing)
        - Expert (Multiple sequences, precise timing)
    validations:
      required: true

  - type: dropdown
    id: brightness_recommendation
    attributes:
      label: Recommended Brightness
      description: What brightness level works best for this preset?
      options:
        - Low (1-30%)
        - Medium (31-70%)
        - High (71-100%)
        - Any
    validations:
      required: true

  - type: textarea
    id: screenshots_videos
    attributes:
      label: Screenshots/Videos
      description: |
        Add screenshots or videos showing the preset in action
        Drag and drop images or paste video links directly

        **Tip:** Videos are especially helpful for dynamic effects!
      placeholder: |
        Drag and drop images here or paste YouTube/Imgur links
    validations:
      required: false

  - type: textarea
    id: color_palette
    attributes:
      label: Color Palette
      description: |
        List the colors used with their RGB/HEX values and names
      placeholder: |
        1. Deep Ocean Blue - RGB(0, 105, 148) - #006994
        2. Ocean Blue - RGB(0, 150, 199) - #0096C7
        3. Sky Blue - RGB(72, 202, 228) - #48CAE4
      render: markdown
    validations:
      required: false

  - type: textarea
    id: variations
    attributes:
      label: Suggested Variations
      description: |
        Suggest variations or modifications others might want to try
      placeholder: |
        - For warmer tones: Replace blues with orange/red (sunset version)
        - For faster effect: Increase speed to 80
        - For Christmas: Use red and green instead of blues
    validations:
      required: false

  - type: textarea
    id: automation_example
    attributes:
      label: Automation Example
      description: |
        If you use this preset in automations, share an example YAML configuration
      placeholder: |
        ```yaml
        automation:
          - alias: "Evening Ocean Waves"
            trigger:
              - platform: sun
                event: sunset
            action:
              - service: aqara_advanced_lighting.restore_preset
                data:
                  entity_id: light.bedroom_ring_light
                  preset_name: "Ocean Waves"
        ```
      render: yaml
    validations:
      required: false

  - type: dropdown
    id: tested_version
    attributes:
      label: Integration Version
      description: What version of Aqara Advanced Lighting did you test with?
      options:
        - 0.6.2 (latest)
        - 0.6.1
        - 0.6.0
        - 0.5.x
        - Older version
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional Notes
      description: |
        Any other information that might be helpful:
        - Tips for best results
        - Known limitations
        - Compatibility notes
        - Credits/inspiration sources
      placeholder: Any additional context or tips
    validations:
      required: false

  - type: checkboxes
    id: community_sharing
    attributes:
      label: Community Sharing
      description: How would you like this preset to be shared?
      options:
        - label: Add to official preset library (if accepted)
        - label: Include in documentation examples
        - label: Share in community preset collection
        - label: Credit me by username in preset metadata

  - type: markdown
    attributes:
      value: |
        ---

        **Thank you for contributing to the community!** 🎨

        After submission:
        - Maintainers will review and test your preset
        - Community members may provide feedback or suggestions
        - Popular presets may be featured in official documentation
        - You'll be credited for your contribution

        **License:** By submitting this preset, you agree to share it under the MIT License, allowing others to use and modify it freely.
