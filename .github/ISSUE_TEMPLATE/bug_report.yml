name: Bug Report
description: Report a bug or issue with the Aqara Advanced Lighting integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us diagnose and fix the issue.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting a bug report
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I am using the latest version of the integration
          required: true
        - label: I have reviewed the documentation and troubleshooting guide
          required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: What version of Aqara Advanced Lighting are you using?
      placeholder: "e.g., 0.6.2"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: What version of Home Assistant are you running?
      placeholder: "e.g., 2025.12.0"
    validations:
      required: true

  - type: input
    id: z2m_version
    attributes:
      label: Zigbee2MQTT Version
      description: What version of Zigbee2MQTT are you using?
      placeholder: "e.g., 2.7.2"
    validations:
      required: true

  - type: dropdown
    id: device_model
    attributes:
      label: Device Model
      description: Which Aqara device model are you having issues with?
      options:
        - T1M (20 segment ring light)
        - T1M (26 segment ring light)
        - T1 Strip (RGB LED strip)
        - T2 RGB/CCT bulb (E26)
        - T2 RGB/CCT bulb (E27)
        - Multiple devices
        - Not device-specific
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the issue you're experiencing
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to...
        2. Click on...
        3. Execute service...
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what should have happened
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Please provide relevant logs from Home Assistant. Enable debug logging for the integration:
        ```yaml
        logger:
          logs:
            custom_components.aqara_advanced_lighting: debug
        ```
        Then restart Home Assistant and reproduce the issue.
      placeholder: Paste your logs here
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: |
        If relevant, provide your integration configuration (redact any sensitive information).
        Include Z2M base topic, device names, and any relevant automation/script configurations.
      placeholder: Paste your configuration here
      render: yaml
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: |
        Add any other context about the problem here:
        - Screenshots or videos
        - Device-specific settings in Zigbee2MQTT
        - Browser console errors (for panel issues)
        - Network configuration
        - Other integrations that might be related
      placeholder: Any additional information that might help
    validations:
      required: false

  - type: checkboxes
    id: affected_areas
    attributes:
      label: Affected Features
      description: Which features are affected by this bug? (Check all that apply)
      options:
        - label: Dynamic RGB effects
        - label: Segment patterns
        - label: Gradients
        - label: Color blocks
        - label: CCT sequences
        - label: RGB segment sequences
        - label: State restoration
        - label: Panel UI
        - label: Presets
        - label: Favorites
        - label: Device configuration
        - label: Service calls
        - label: Other
